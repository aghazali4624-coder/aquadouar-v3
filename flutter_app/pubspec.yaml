name: aquadouar
description: AquaDouar – Water Management App — Firebase Edition v3
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Firebase
  firebase_core:        ^3.6.0
  firebase_auth:        ^5.3.1
  cloud_firestore:      ^5.4.4
  firebase_storage:     ^12.3.4   # stockage photos compteurs
  # Offline
  connectivity_plus:    ^6.0.3
  sqflite:              ^2.3.3+1
  path:                 ^1.9.0
  path_provider:        ^2.1.3
  # State & Prefs
  shared_preferences:   ^2.3.2
  provider:             ^6.1.2
  # UI
  fl_chart:             ^0.68.0
  image_picker:         ^1.1.2    # photo compteur
  cached_network_image: ^3.3.1   # affichage photos
  # PDF
  pdf:                  ^3.11.0
  printing:             ^5.13.1
  # Utils
  url_launcher:         ^6.3.0
  intl:                 ^0.20.2
  uuid:                 ^4.4.2
  cupertino_icons:      ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
